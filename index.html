    <style>
        /* CSS for Minimalist Look */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d0d0d; /* Deep Black for Revolutionary vibe */
            color: #ffffff;
            overflow: hidden;
            font-family: 'Hind Siliguri', sans-serif;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 5rem; /* Large Bold Font */
            font-weight: 700;
            letter-spacing: 2px;
            cursor: default;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        h1:hover {
            color: #e74c3c; /* Revolutionary Red on hover */
            transform: scale(1.05);
        }

        /* Subtle glow effect */
        .glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            h1 {
                font-size: 3rem;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
